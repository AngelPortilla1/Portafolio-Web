    <!-- Theme Color -->
    <meta name="theme-color" content="#111d27" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafb" media="(prefers-color-scheme: light)" />

    <!-- Prevent FOUC for dark mode -->
    <script>
      (function(){
        var t=localStorage.getItem('theme');
        if(t==='light'){document.documentElement.classList.remove('dark')}
        else if(!t&&window.matchMedia('(prefers-color-scheme:light)').matches){document.documentElement.classList.remove('dark')}
      })();
    </script>

    <!-- Favicon -->
